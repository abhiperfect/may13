<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Little Surprise</title>
    <!-- Importing a beautiful rounded font -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #fff1f2 0%, #ffd1d1 100%);
            color: #4a4a4a;
        }

        /* Screens */
        .screen {
            display: none;
            height: 100vh;
            width: 100%;
            padding: 30px;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .active {
            display: flex;
        }

        /* Images with a soft floating animation */
        img {
            width: 80%;
            max-width: 250px;
            margin-bottom: 30px;
            border-radius: 20px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Text Styling */
        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            line-height: 1.4;
            color: #d63384;
        }

        /* Beautiful Buttons */
        .btn-container {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        button:active {
            transform: scale(0.95);
        }

        .yes {
            background: #ff85a2;
            color: white;
        }

        .no {
            background: #f8f9fa;
            color: #adb5bd;
            font-size: 14px; /* Makes the 'no' feel less important */
        }

        .back {
            background: #4a4a4a;
            color: white;
            margin-top: 20px;
        }

        /* Video screen */
        #screen3 {
            padding: 0;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Keeps video aspect ratio perfect */
        }
    </style>
</head>

<body>

<!-- Screen 1: The Ask -->
<div id="screen1" class="screen active">
    <img src="cat0.png" alt="Cute Cat">
    <h2>I have a tiny gift for you... <br>Want to see? 🎁</h2>
    <div class="btn-container">
        <button class="yes" onclick="goYes()">Yes!</button>
        <button class="no" onclick="goNo()">No</button>
    </div>
</div>

<!-- Screen 2: The "Guilt Trip" -->
<div id="screen2" class="screen">
    <img src="cat1.png" alt="Angry Cat">
    <h2>How dare you say NO! <br>Try again, please? 😾</h2>
    <button class="back" onclick="goBack()">Go Back</button>
</div>

<!-- Screen 3: The Big Reveal -->
<div id="screen3" class="screen">
    <video id="video" playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>
</div>

<script>
    function goYes() {
        document.getElementById('screen1').classList.remove('active');
        document.getElementById('screen3').classList.add('active');

        let vid = document.getElementById("video");
        vid.muted = false;
        vid.play();
    }

    function goNo() {
        document.getElementById('screen1').classList.remove('active');
        document.getElementById('screen2').classList.add('active');
    }

    function goBack() {
        document.getElementById('screen2').classList.remove('active');
        document.getElementById('screen1').classList.add('active');
    }
</script>

</body>
